services:
  - type: web
    name: hillradar-api
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
